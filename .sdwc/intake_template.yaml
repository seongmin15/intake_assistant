    responsibility: ""
    communication_with:                     # optional
      - target: ""
        protocol: ""
        sync_async: ""

    # --- Tech Stack (data_pipeline) ---
    language: ""                            # required -- values: python | java | scala | sql
    framework: ""                           # required -- values: airflow | dagster | prefect | spark | dbt | flink
    framework_rationale: ""                 # optional -- rationale for selection
    framework_alternatives:                 # optional -- considered alternatives
      - name: ""
        rejection_reason: ""
    build_tool: ""                          # required -- values: poetry | pip | gradle | maven | sbt
    build_tool_rationale: ""                # optional
    key_libraries:                          # optional -- key libraries
      - name: ""
        purpose: ""
        version_constraint: ""             # optional

    # --- Pipeline List -> docs/{name}/60-pipeline-design.md ---
    pipelines:                              # required -- pipeline list
      - name: ""                            # required
        responsibility: ""                  # required

        sources:                            # required -- data sources
          - name: ""                        # required
            system: ""                      # required
            extraction_method: ""           # optional -- values: full | incremental | cdc | api_poll
            format: ""                      # optional -- values: json | csv | parquet | avro | protobuf | xml
        transformation_steps:               # optional -- transformation steps
          - ""
        sinks:                              # required -- load targets
          - name: ""                        # required

    local_storage: ""                       # optional -- values: sqlite | realm | async_storage | mmkv | core_data
    sync_strategy: ""                       # optional -- offline->online sync strategy
    cache_policy: ""                        # optional

    device_features:                        # optional -- device feature usage
      - feature: ""                         # values: camera | gps | biometrics | push | nfc | bluetooth | accelerometer | contacts
        purpose: ""
        permission: ""
        denial_behavior: ""                 # behavior when permission denied

    push_notification:                      # optional -- DELETE THIS BLOCK if not using push notifications
      service: ""                           # values: fcm | apns | onesignal | expo_push
      types:
        - type: ""

name: CI — intake-assistant-api

on:
  pull_request:
    branches: [main]
    paths:
      - "intake-assistant-api/**"
  push:
    branches: [main]
    paths:
      - "intake-assistant-api/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: intake-assistant-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry==2.1.1

      - name: Configure Poetry
        run: |
          poetry config virtualenvs.in-project true
          poetry config virtualenvs.create true

      - name: Cache .venv
        uses: actions/cache@v4
        with:
          path: intake-assistant-api/.venv
          key: venv-${{ runner.os }}-3.12-${{ hashFiles('intake-assistant-api/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-3.12-

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Lint
        run: poetry run ruff check src/

      - name: Test
        run: poetry run pytest --tb=short

  docker:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image metadata
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: intake-assistant-api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/intake-assistant-api:sha-${{ env.SHORT_SHA }}
            ghcr.io/${{ env.REPO_LC }}/intake-assistant-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
